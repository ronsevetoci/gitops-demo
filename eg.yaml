                - regex: \.zone(\.(([^\.]+)\.))
                  tag_name: from_zone
                - regex: \.zone\.[^\.]+\.(([^\.]+)\.)
                  tag_name: to_zone
                - regex: "^cluster(\\..+\\.(.+))\\.total_match_count$"
                  tag_name: socket_match_name
                - regex: "circuit_breakers\\.((.+?)\\.).+"
