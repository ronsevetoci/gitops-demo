                  set_node_on_first_message_only: true
                lds_config:
                  ads: {}
                  initial_fetch_timeout: 0s
                  resource_api_version: V3
                cds_config:
                  ads: {}
                  initial_fetch_timeout: 0s
                  resource_api_version: V3
              static_resources:
                listeners:
                - name: envoy-gateway-proxy-stats-0.0.0.0-19001
                  address:
                    socket_address:
                      address: '0.0.0.0'
                      port_value: 19001
                      protocol: TCP
                  bypass_overload_manager: true
                  filter_chains:
                  - filters:
                    - name: envoy.filters.network.http_connection_manager
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                        stat_prefix: eg-stats-http
                        normalize_path: true
                        route_config:
                          name: local_route
                          virtual_hosts:
                          - name: prometheus_stats
                            domains:
                            - "*"
                            routes:
                            - match:
                                path: /stats/prometheus
                                headers:
                                - name: ":method"
                                  string_match:
                                    exact: GET
                              route:
                                cluster: prometheus_stats
                        http_filters:
                        - name: envoy.filters.http.router
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                clusters:
                - name: prometheus_stats
                  connect_timeout: 0.250s
                  type: STATIC
                  lb_policy: ROUND_ROBIN
                  load_assignment:
                    cluster_name: prometheus_stats
                    endpoints:
                    - lb_endpoints:
                      - endpoint:
                          address:
                            socket_address:
                              address: 127.0.0.1
                              port_value: 19000
                - connect_timeout: 10s
                  eds_cluster_config:
                    eds_config:
                      ads: {}
                      resource_api_version: 'V3'
                    service_name: demo/public-gateway
                  load_balancing_policy:
                    policies:
                    - typed_extension_config:
                        name: 'envoy.load_balancing_policies.least_request'
                        typed_config:
                          '@type': 'type.googleapis.com/envoy.extensions.load_balancing_policies.least_request.v3.LeastRequest'
                          locality_lb_config:
                            zone_aware_lb_config:
                              min_cluster_size: '1'
                  name: demo/public-gateway
                  type: EDS
                - connect_timeout: 10s
                  load_assignment:
                    cluster_name: xds_cluster
                    endpoints:
                    - load_balancing_weight: 1
                      lb_endpoints:
                      - load_balancing_weight: 1
                        endpoint:
                          address:
                            socket_address:
                              address: envoy-gateway.envoy-gateway-system.svc.cluster.local.
                              port_value: 18000
                  typed_extension_protocol_options:
                    envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
                      "@type": "type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions"
                      explicit_http_config:
                        http2_protocol_options:
                          connection_keepalive:
                            interval: 30s
                            timeout: 5s
                  name: xds_cluster
                  type: STRICT_DNS
                  transport_socket:
                    name: envoy.transport_sockets.tls
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
                      common_tls_context:
                        tls_params:
                          tls_maximum_protocol_version: TLSv1_3
                        tls_certificate_sds_secret_configs:
                        - name: xds_certificate
                          sds_config:
                            path_config_source:
                              path: /sds/xds-certificate.json
                            resource_api_version: V3
                        validation_context_sds_secret_config:
                          name: xds_trusted_ca
                          sds_config:
                            path_config_source:
                              path: /sds/xds-trusted-ca.json
                            resource_api_version: V3
              overload_manager:
                refresh_interval: 0.25s
                resource_monitors:
                - name: "envoy.resource_monitors.global_downstream_max_connections"
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.resource_monitors.downstream_connections.v3.DownstreamConnectionsConfig
                    max_active_downstream_connections: 50000
            - '--log-level'
            - warn
            - '--cpuset-threads'
            - '--drain-strategy'
            - immediate
            - '--component-log-level'
            - misc:error
            - '--drain-time-s'
            - '60'
          ports:
            - name: metrics
              containerPort: 19001
              protocol: TCP
            - name: readiness
              containerPort: 19003
              protocol: TCP
          env:
            - name: ENVOY_POD_NAMESPACE
