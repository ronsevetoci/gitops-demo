        prometheus.io/port: '19001'
        prometheus.io/scrape: 'true'
    spec:
      volumes:
        - name: certs
          secret:
            secretName: envoy
            defaultMode: 420
        - name: sds
          configMap:
            name: envoy-demo-public-gateway-7dc96388
            items:
              - key: xds-trusted-ca.json
                path: xds-trusted-ca.json
              - key: xds-certificate.json
                path: xds-certificate.json
            defaultMode: 420
            optional: false
      containers:
        - name: envoy
          image: docker.io/envoyproxy/envoy:distroless-v1.38.0
          command:
            - envoy
          args:
            - '--service-cluster'
            - demo/public-gateway
