---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: pool1
spec:
  template:
    spec:
      nodeClassRef:
        group: oci.oraclecloud.com
        kind: OCINodeClass
        name: goldenimage
      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]
        - key: "oci.oraclecloud.com/instance-shape"
          operator: In
          values:
            - VM.Standard.E3.Flex
            - VM.Standard.E4.Flex
            - VM.Standard.E5.Flex
            - VM.Standard.E6.Flex
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]

      # Shorter for test cleanup.
      terminationGracePeriod: 5m

  disruption:
    # Test pool: remove empty nodes quickly.
    consolidationPolicy: WhenEmpty
    consolidateAfter: 1m

    # Allow more aggressive cleanup in test.
    budgets:
      - nodes: 50%

  # Raise this based on expected test size.
  # Example: 100 x 2-OCPU nodes = 200 CPU.
  # Example: 100 x 4-OCPU nodes = 400 CPU.
  limits:
    cpu: 20
    memory: 100Gi
---
apiVersion: oci.oraclecloud.com/v1beta1
kind: OCINodeClass
metadata:
  name: classA
spec:
  nodeCompartmentId: "ocid1.compartment.oc1..aaaaaaaayevnkjfyjb6nglndfrvgoy7hciclgf4kq7ioulokey7xfpixjhxa"
  metadata:
    user_data: ""
  shapeConfigs:
    - ocpus: 1
      memoryInGbs: 4
    - ocpus: 2
      memoryInGbs: 8
    - ocpus: 4
      memoryInGbs: 16
  volumeConfig:
    bootVolumeConfig:
       imageConfig:
        imageType: OKEImage
        imageId: "ocid1.image.oc1.eu-frankfurt-1.aaaaaaaaoueekikb5aobkccrctvrg7bukuw5bicd222tt6nv22ojzmkqea7q"
  networkConfig:
    primaryVnicConfig:
      networkSecurityGroupConfigs:
        - networkSecurityGroupId: ocid1.networksecuritygroup.oc1.eu-frankfurt-1.aaaaaaaan3so3df64lg2lpzubsut4fu437b3uwayjclkpkiymu7xjatecvjq
      subnetConfig:
        subnetId: ocid1.subnet.oc1.eu-frankfurt-1.aaaaaaaahwjd57to4sdamx4tjkz2fxwymxdivb5zk6pfuwkiauvscgf5ywdq
    secondaryVnicConfigs:
      - networkSecurityGroupConfigs:
          - networkSecurityGroupId: ocid1.networksecuritygroup.oc1.eu-frankfurt-1.aaaaaaaagpgbuvfknthclsnhvn26yfsnacjjuvt42jxkn6dvma4eghylwffq
        subnetConfig:
          subnetId: ocid1.subnet.oc1.eu-frankfurt-1.aaaaaaaa2jo64gdsywfmk2cq3c62fykegcqhyyv52y3iawtryhgw2qtcgkrq
        ipCount: 64