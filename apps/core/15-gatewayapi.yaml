apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatewayapi
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: platform
  source:
    repoURL: https://github.com/ronsevetoci/gitops-demo.git
    targetRevision: master
    path: apps/infra/gatewayapi
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # - CreateNamespace=true
      # IAM resources are often CRDs; this avoids early dry-run failures:
      - SkipDryRunOnMissingResource=true
