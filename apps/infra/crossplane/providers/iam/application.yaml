apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iam-provider
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "14"
spec:
  project: platform
  source:
    repoURL: https://github.com/ronsevetoci/gitops-demo.git
    targetRevision: master
    path: manifests/crossplane-providers/providers/iam
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # - CreateNamespace=true
      # IAM resources are often CRDs; this avoids early dry-run failures:
      - SkipDryRunOnMissingResource=true
